<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход в админ-панель | Weddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Unbounded:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1C2E4A 0%, #2C4A6E 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }

        .login-logo h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.8rem;
            color: #1C2E4A;
        }

        .login-logo p {
            color: #6B7A8A;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1C2E4A;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #E2D9CE;
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4A5A5;
            box-shadow: 0 0 0 3px rgba(212, 165, 165, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1C2E4A;
            color: white;
            border: none;
            border-radius: 60px;
            font-family: 'Unbounded', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #2C4A6E;
            transform: translateY(-2px);
        }

        .error-message {
            display: none;
            background: rgba(244, 67, 54, 0.1);
            color: #C62828;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #6B7A8A;
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">✦</span>
                <h1>Weddy</h1>
                <p>Вход в админ-панель</p>
            </div>

            <div class="error-message" id="errorMessage">
                ❌ Неверный пароль. Попробуйте ещё раз.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль" autofocus>
                </div>
                <button type="submit" class="login-btn">Войти</button>
            </form>

            <div class="login-footer">
                🔒 Только для организаторов и молодожёнов
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');

        // Пароль (можно изменить)
        const CORRECT_PASSWORD = 'weddy2026';

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            if (password === CORRECT_PASSWORD) {
                // Сохраняем, что пользователь вошёл
                sessionStorage.setItem('adminAuthenticated', 'true');
                // Переходим в админку
                window.location.href = 'admin.html';
            } else {
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });

        // Enter для отправки
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
