<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход в админ-панель | Weddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Unbounded:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1C2E4A 0%, #2C4A6E 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }

        .login-logo h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.8rem;
            color: #1C2E4A;
        }

        .login-logo p {
            color: #6B7A8A;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1C2E4A;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #E2D9CE;
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4A5A5;
            box-shadow: 0 0 0 3px rgba(212, 165, 165, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1C2E4A;
            color: white;
            border: none;
            border-radius: 60px;
            font-family: 'Unbounded', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .login-btn:hover:not(:disabled) {
            background: #2C4A6E;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: rgba(244, 67, 54, 0.1);
            color: #C62828;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #6B7A8A;
            font-size: 0.75rem;
        }

        .projects-list {
            margin-top: 20px;
            border-top: 1px solid #EEEEEE;
            padding-top: 20px;
        }

        .projects-list .project-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #F5F5F5;
            font-size: 0.9rem;
            color: #6B7A8A;
        }

        .projects-list .project-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            flex-shrink: 0;
        }

        .projects-list .project-item .status.inactive {
            background: #BDBDBD;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">✦</span>
                <h1>Weddy</h1>
                <p>Вход в админ-панель</p>
            </div>

            <div class="error-message" id="errorMessage">
                ❌ Неверный пароль. Попробуйте ещё раз.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль" autofocus>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Войти</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="projects-list" id="projectsList">
                <div style="font-size:0.8rem; color:#BDBDBD; margin-bottom:8px;">Доступные свадьбы:</div>
                <div class="project-item">
                    <span class="status" id="status1"></span>
                    <span>Анна & Дмитрий</span>
                </div>
                <div class="project-item">
                    <span class="status" id="status2"></span>
                    <span>Екатерина & Алексей</span>
                </div>
            </div>

            <div class="login-footer">
                🔒 Только для организаторов и молодожёнов
            </div>
        </div>
    </div>

    <script>
        // =====================================================
        // СПИСОК ВСЕХ ТАБЛИЦ
        // =====================================================
        // Добавляйте новые таблицы сюда
        const TABLES = [
            {
                id: 'project1',
                name: 'Анна & Дмитрий',
                url: 'https://script.google.com/macros/s/AKfycbwfoos2zqwne_w590SYU4QIp5GaCVZ9ON-9txOlrYsfQvJBBRRA3eg4FVHH7GS2TaXs/exec',
                statusEl: 'status1'
            },
            {
                id: 'project2',
                name: 'Екатерина & Алексей',
                url: 'https://script.google.com/macros/s/AKfycbwaLA-_88Yf7ubM1ErGJZsTwlAcD5hOEQSJ5fk0YHoCdwpUGLx2DpHYMOAXPlQyzDtPdg/exec',
                statusEl: 'status2'
            }
        ];

        // =====================================================
        // ПРОВЕРКА ПАРОЛЯ В ТАБЛИЦЕ
        // =====================================================
        function checkPasswordInTable(tableUrl, password) {
            const url = tableUrl + '?password=' + encodeURIComponent(password);
            
            return fetch(url)
                .then(response => response.json())
                .then(data => {
                    return { success: data.success, tableUrl: tableUrl };
                })
                .catch(() => {
                    return { success: false, tableUrl: tableUrl };
                });
        }

        // =====================================================
        // ПРОВЕРКА ВСЕХ ТАБЛИЦ
        // =====================================================
        function checkAllTables(password) {
            const promises = TABLES.map(table => {
                return checkPasswordInTable(table.url, password)
                    .then(result => {
                        return { ...result, name: table.name, id: table.id };
                    });
            });

            return Promise.all(promises);
        }

        // =====================================================
        // ОБНОВЛЕНИЕ СТАТУСОВ ТАБЛИЦ
        // =====================================================
        function updateTableStatuses() {
            TABLES.forEach(table => {
                const el = document.getElementById(table.statusEl);
                if (el) {
                    // Просто проверяем, что таблица доступна
                    fetch(table.url)
                        .then(() => {
                            el.className = 'status';
                        })
                        .catch(() => {
                            el.className = 'status inactive';
                        });
                }
            });
        }

        // =====================================================
        // ОБРАБОТКА ВХОДА
        // =====================================================
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            if (!password) {
                errorMessage.textContent = '❌ Введите пароль';
                errorMessage.classList.add('show');
                return;
            }

            // Показываем загрузку
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            errorMessage.classList.remove('show');

            // Проверяем все таблицы
            checkAllTables(password)
                .then(results => {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;

                    // Ищем успешную проверку
                    const found = results.find(r => r.success === true);

                    if (found) {
                        // Сохраняем URL таблицы в сессию
                        sessionStorage.setItem('tableUrl', found.tableUrl);
                        sessionStorage.setItem('projectName', found.name);
                        sessionStorage.setItem('projectId', found.id);
                        sessionStorage.setItem('adminAuthenticated', 'true');
                        
                        // Переходим в админку
                        window.location.href = 'admin.html';
                    } else {
                        errorMessage.textContent = '❌ Неверный пароль. Попробуйте ещё раз.';
                        errorMessage.classList.add('show');
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                })
                .catch(() => {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    errorMessage.textContent = '❌ Ошибка подключения к таблицам. Попробуйте позже.';
                    errorMessage.classList.add('show');
                });
        });

        // Enter для отправки
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // Проверяем статус таблиц при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            updateTableStatuses();
        });
    </script>
</body>
</html>
